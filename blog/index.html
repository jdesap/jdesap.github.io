<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wtv — jdesap</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>const s=localStorage.getItem('theme');if(s&&s!=='light')document.documentElement.setAttribute('data-theme',s);</script>
</head>
<body>
  <div class="grain"></div>
  <nav>
    <a href="../index.html" class="nav-name">jdesap</a>
    <div class="nav-links">
      <a href="../math/index.html">math</a>
      <a href="../blog/index.html">blog</a>
      <div class="theme-toggle-wrap" id="themeWrap">
        <button class="theme-toggle" id="themeToggle" aria-label="Choose theme">
          <i class="fa-solid fa-palette"></i>
        </button>
        <div class="theme-menu" id="themeMenu">
          <button class="theme-option" data-theme="light">  <span class="theme-swatch" style="background:#8b3a1a"></span>light</button>
          <button class="theme-option" data-theme="dark">   <span class="theme-swatch" style="background:#c4673a"></span>dark</button>
          <button class="theme-option" data-theme="dracula"><span class="theme-swatch" style="background:#bd93f9"></span>dracula</button>
          <button class="theme-option" data-theme="gruvbox"><span class="theme-swatch" style="background:#fabd2f"></span>gruvbox</button>
          <button class="theme-option" data-theme="nord">   <span class="theme-swatch" style="background:#88c0d0"></span>nord</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="section-main">
    <div class="section-header">
      <h1>blog</h1>
      <p>wtv comes to my mind.</p>
    </div>
    <ul class="post-list">
      <!-- Aggiungi qui gli articoli> -->
      <li class="empty-state">No posts yet — check back soon.</li>
    </ul>
  </main>

  <footer><span>jdesap</span></footer>
  <script>
    const wrap=document.getElementById('themeWrap');
    document.getElementById('themeToggle').addEventListener('click',e=>{e.stopPropagation();wrap.classList.toggle('open');});
    document.addEventListener('click',()=>wrap.classList.remove('open'));
    function applyTheme(th){if(th==='light')document.documentElement.removeAttribute('data-theme');else document.documentElement.setAttribute('data-theme',th);document.querySelectorAll('.theme-option').forEach(d=>d.classList.toggle('active',d.dataset.theme===th));}
    applyTheme(localStorage.getItem('theme')||'light');
    document.getElementById('themeMenu').addEventListener('click',e=>{const opt=e.target.closest('.theme-option');if(!opt)return;const th=opt.dataset.theme;localStorage.setItem('theme',th);applyTheme(th);wrap.classList.remove('open');});
  </script>
</body>
</html>
