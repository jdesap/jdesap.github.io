<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../assets/css/style.css" />

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>const s=localStorage.getItem('theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>
  <div class="grain"></div>
  <nav>
    <a href="../index.html" class="nav-name">jdesap</a>
    <div class="nav-links">
      <a href="../math/index.html">math</a>
      <a href="../blog/index.html">wtv</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </div>
  </nav>

  <main class="section-main">
    <div class="section-header">
      <h1>wtv</h1>
      <p>the title is self explainatory.</p>
    </div>
    <ul class="post-list">
      <!-- ✏️ ADD POSTS HERE, e.g.:
      <li class="post-item">
        <a href="my-post.html">Title</a>
        <span class="post-date">2025-06-01</span>
      </li>
      -->
      <li class="empty-state">No posts yet — check back soon.</li>
    </ul>
  </main>

  <footer><span>jdesap</span></footer>
  <script>
    const t=document.getElementById('themeToggle'),i=document.getElementById('themeIcon');
    function applyTheme(th){if(th==='dark'){document.documentElement.setAttribute('data-theme','dark');i.className='fa-solid fa-sun';}else{document.documentElement.removeAttribute('data-theme');i.className='fa-solid fa-moon';}}
    applyTheme(localStorage.getItem('theme')||'light');
    t.addEventListener('click',()=>{const d=document.documentElement.getAttribute('data-theme')==='dark';const n=d?'light':'dark';localStorage.setItem('theme',n);applyTheme(n);});
  </script>
</body>
</html>
