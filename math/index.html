<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>math — jdesap</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>const s=localStorage.getItem('theme');if(s&&s!=='light')document.documentElement.setAttribute('data-theme',s);</script>
</head>
<body>
  <div class="grain"></div>
  <nav>
    <a href="../index.html" class="nav-name">jdesap</a>
    <div class="nav-links">
      <a href="../math/index.html">math</a>
      <a href="../blog/index.html">blog</a>
      <div class="theme-picker" id="themePicker">
        <button class="theme-dot" data-theme="light"   style="background:#8b3a1a" aria-label="Light"   title="light"></button>
        <button class="theme-dot" data-theme="dark"    style="background:#c4673a" aria-label="Dark"    title="dark"></button>
        <button class="theme-dot" data-theme="dracula" style="background:#bd93f9" aria-label="Dracula" title="dracula"></button>
        <button class="theme-dot" data-theme="gruvbox" style="background:#fabd2f" aria-label="Gruvbox" title="gruvbox"></button>
        <button class="theme-dot" data-theme="nord"    style="background:#88c0d0" aria-label="Nord"    title="nord"></button>
      </div>
    </div>
  </nav>

  <main class="section-main">
    <div class="section-header">
      <h1>math</h1>
      <p>notes, lectures and articles.</p>
    </div>

      <!--  Aggiungo qui gli articoli, e.g.:-->
      
      <li class="post-item">

      </li>
    </ul>
  </main>

  <footer><span>jdesap</span></footer>
  <script>
    function applyTheme(th){if(th==='light')document.documentElement.removeAttribute('data-theme');else document.documentElement.setAttribute('data-theme',th);document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active',d.dataset.theme===th));}
    applyTheme(localStorage.getItem('theme')||'light');
    document.getElementById('themePicker').addEventListener('click',e=>{const dot=e.target.closest('.theme-dot');if(!dot)return;const th=dot.dataset.theme;localStorage.setItem('theme',th);applyTheme(th);});
  </script>
</body>
</html>
